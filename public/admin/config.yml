backend:
  name: git-gateway
  branch: main

media_folder: "public/uploads"
public_folder: "/uploads"

collections:
  - name: "projects"
    label: "Projeler"
    folder: "src/content/projects"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Proje Başlığı", name: "title", widget: "string" }
      - { label: "Kategori", name: "category", widget: "string" }
      - { label: "Tarih", name: "date", widget: "string", required: false }
      - { label: "Konum", name: "location", widget: "string", required: false }
      - { label: "Tasarım", name: "architect", widget: "string", required: false }
      - { label: "Kapak Görseli", name: "cover", widget: "image" }
      - { label: "Açıklama", name: "description", widget: "text" }
      - { label: "Galeri", name: "gallery", widget: "list", field: { label: "Görsel", name: "image", widget: "image" }, required: false }
      - { label: "Etiketler", name: "tags", widget: "list", required: false }
      - { label: "Detay Yazısı", name: "body", widget: "markdown", required: false }